workflows:
  ios_unsigned_altstore:
    name: iOS Unsigned Build (AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        PROJECT_DIR: isms_mobile

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $CM_BUILD_DIR/$PROJECT_DIR/ios/Pods

    scripts:
      - name: Flutter dependencies
        script: |
          cd "$CM_BUILD_DIR/$PROJECT_DIR"
          flutter --version
          flutter pub get

      - name: CocoaPods install
        script: |
          cd "$CM_BUILD_DIR/$PROJECT_DIR/ios"
          pod install --repo-update

      - name: Build iOS app (no signing)
        script: |
          cd "$CM_BUILD_DIR/$PROJECT_DIR"
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA for AltStore
        script: |
          cd "$CM_BUILD_DIR/$PROJECT_DIR"
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          /usr/bin/zip -r Runner-unsigned-altstore.ipa Payload

    artifacts:
      - $CM_BUILD_DIR/$PROJECT_DIR/build/ios/ipa/Runner-unsigned-altstore.ipa
      - $CM_BUILD_DIR/$PROJECT_DIR/build/ios/iphoneos/Runner.app
      - $CM_BUILD_DIR/$PROJECT_DIR/build/ios/iphoneos/*.dSYM
