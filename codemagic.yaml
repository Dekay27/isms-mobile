workflows:
  ios_unsigned_altstore:
    name: iOS Unsigned Build (AltStore)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $CM_BUILD_DIR/ios/Pods
        - $CM_BUILD_DIR/isms_mobile/ios/Pods

    scripts:
      - name: Resolve project directory
        script: |
          if [ -f "$CM_BUILD_DIR/pubspec.yaml" ]; then
            echo "PROJECT_DIR=$CM_BUILD_DIR" >> "$CM_ENV"
          elif [ -f "$CM_BUILD_DIR/isms_mobile/pubspec.yaml" ]; then
            echo "PROJECT_DIR=$CM_BUILD_DIR/isms_mobile" >> "$CM_ENV"
          else
            echo "Could not find Flutter project root (pubspec.yaml)." >&2
            ls -la "$CM_BUILD_DIR"
            exit 1
          fi

      - name: Flutter dependencies
        script: |
          cd "$PROJECT_DIR"
          flutter --version
          flutter pub get

      - name: CocoaPods install
        script: |
          cd "$PROJECT_DIR/ios"
          pod install --repo-update

      - name: Build iOS app (no signing)
        script: |
          cd "$PROJECT_DIR"
          flutter build ios --release --no-codesign

      - name: Package unsigned IPA for AltStore
        script: |
          cd "$PROJECT_DIR"
          rm -rf build/ios/ipa
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          /usr/bin/zip -r Runner-unsigned-altstore.ipa Payload

    artifacts:
      - build/ios/ipa/Runner-unsigned-altstore.ipa
      - build/ios/iphoneos/Runner.app
      - build/ios/iphoneos/*.dSYM
      - isms_mobile/build/ios/ipa/Runner-unsigned-altstore.ipa
      - isms_mobile/build/ios/iphoneos/Runner.app
      - isms_mobile/build/ios/iphoneos/*.dSYM
